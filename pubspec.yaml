name: sarnmue
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.5.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_tts: ^4.2.2
  http: ^1.6.0
  web_socket_channel: ^3.0.1
  video_player: ^2.9.5
  flutter_vlc_player: ^7.4.2
  esp_smartconfig: ^3.0.0
  mobile_scanner: ^6.0.11
  wifi_scan: ^0.4.1+2
  permission_handler: ^12.0.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/logo.png
    - .env

  fonts:
    - family: Taviraj
      fonts:
        - asset: assets/fonts/Taviraj-Regular.ttf
        - asset: assets/fonts/Taviraj-Medium.ttf
          weight: 500
        - asset: assets/fonts/Taviraj-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"  # เปลี่ยนให้ตรงกับที่อยู่ไฟล์รูปของคุณ
  min_sdk_android: 21 # สำหรับ Android รุ่นใหม่ๆ
